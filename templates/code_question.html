<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Code Editor - ASM_ZINE</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }

    .brutal-editor-container {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    /* Left Panel: Instructions (White brutalist) */
    .left-panel {
      width: 40%;
      padding: 30px;
      background-color: #fff;
      border-right: var(--border-thick);
      overflow-y: auto;
      height: 100vh;
      box-shadow: inset -8px 0px 0px rgba(0,0,0,0.05);
    }

    .question-title {
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 20px;
      text-transform: uppercase;
      color: var(--brutal-black);
      border-bottom: var(--border-thick);
      padding-bottom: 10px;
      display: inline-block;
    }
    
    .question-title::before {
      content: "TASK // ";
      color: var(--brutal-pink);
    }

    .question-description {
      font-size: 16px;
      color: var(--brutal-gray-dark);
      line-height: 1.6;
      font-family: var(--font-sans);
      margin-bottom: 20px;
      font-weight: bold;
    }

    .solution-btn {
      margin-top: 20px;
      padding: 12px 18px;
      background-color: var(--brutal-cyan);
      color: var(--brutal-black);
      border: var(--border-thick);
      box-shadow: var(--shadow-medium);
      cursor: pointer;
      font-family: var(--font-mono);
      font-weight: 800;
      text-transform: uppercase;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .solution-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--brutal-black);
    }

    #solution-box {
      margin-top: 20px;
      display: none;
      background: var(--brutal-bg);
      padding: 15px;
      border: var(--border-thick);
      box-shadow: var(--shadow-medium);
      color: var(--brutal-black);
      white-space: pre-wrap;
      font-family: var(--font-mono);
      font-weight: bold;
      font-size: 14px;
    }

    /* Right Panel: Code Editor (Dark Terminal inside White Border) */
    .right-panel {
      width: 60%;
      padding: 30px;
      display: flex;
      flex-direction: column;
      background-color: var(--brutal-bg);
      position: relative;
    }

    .code-editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: var(--border-thick);
      background: #000;
      box-shadow: var(--shadow-massive);
      padding-bottom: 2px;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border-bottom: var(--border-thick);
      padding: 10px 15px;
    }
    
    .editor-header h3 {
      font-family: var(--font-mono);
      text-transform: uppercase;
      font-size: 16px;
    }

    .architecture-select {
      padding: 6px 12px;
      background-color: var(--brutal-cyan);
      color: var(--brutal-black);
      border: var(--border-thick);
      font-family: var(--font-mono);
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }

    textarea {
      flex: 1;
      width: 100%;
      background-color: #000;
      color: #00ff00; /* Hacker Green text */
      border: none;
      padding: 20px;
      font-family: 'Space Mono', Courier, monospace;
      font-size: 16px;
      resize: none;
      min-height: 0;
      outline: none;
    }

    .bottom-actions {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-top: 20px;
    }

    .back-btn {
      display: inline-block;
      font-family: var(--font-mono);
      font-weight: bold;
      padding: 10px 20px;
      border: var(--border-thick);
      text-decoration: none;
      color: var(--brutal-black);
      background: #fff;
      box-shadow: var(--shadow-medium);
    }
    .back-btn:hover {
      background: var(--brutal-pink);
    }

    .submit-btn {
      padding: 14px 24px;
      background-color: var(--brutal-green);
      color: var(--brutal-black);
      border: var(--border-thick);
      box-shadow: var(--shadow-medium);
      cursor: pointer;
      font-weight: 800;
      font-size: 16px;
      font-family: var(--font-mono);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .submit-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--brutal-black);
    }

    .submit-btn:disabled {
      background-color: var(--brutal-gray-light);
      cursor: not-allowed;
    }

    .output-block {
      margin-top: 20px;
      background: #000;
      padding: 15px;
      border: var(--border-thick);
      box-shadow: var(--shadow-medium);
      color: #fff;
    }
    
    .output-block h3 {
      font-family: var(--font-mono);
      color: var(--brutal-cyan);
      margin-bottom: 10px;
      font-size: 14px;
    }

    .output-block pre {
      white-space: pre-wrap;
      font-family: var(--font-mono);
      font-size: 14px;
    }

    #result-indicator {
      font-family: var(--font-mono);
      font-size: 14px;
      text-transform: uppercase;
      border: var(--border-thick);
      margin-top: 10px;
      padding: 10px;
      font-weight: 800;
    }
  </style>
</head>
<body class="brutal-dot-bg">

  <div class="brutal-editor-container">
    <div class="left-panel">
      <div class="question-title" id="question-title">Loading...</div>
      <div class="question-description" id="question-description"></div>
      <button class="solution-btn" id="solution-btn">SHOW // SOLUTION</button>
      <pre id="solution-box"></pre>
    </div>

    <div class="right-panel">
      <form class="code-editor">
        <div class="editor-header">
          <h3>>_ TERMINAL</h3>
          <select class="architecture-select" name="architecture">
            <option value="x86">x86 Assembly</option>
            <option value="mips32">MIPS32 Assembly</option>
            <option value="arm">ARM Assembly</option>
          </select>
        </div>
        <textarea name="code" id="code-editor" spellcheck="false"></textarea>
        
        <div class="bottom-actions">
           <a href="{{ url_for('playground') }}" class="back-btn">← EXIT_TERMINAL</a>
           <button type="submit" class="submit-btn">> EXECUTE</button>
        </div>
        
        <div class="output-block" style="display: none;">
          <h3>EXEC_OUTPUT:</h3>
          <pre id="output-content"></pre>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Get question ID from URL
      const pathParts = window.location.pathname.split('/');
      const questionId = pathParts[pathParts.length - 1];
      
      // Load question data
      try {
        const response = await fetch(`/api/question/${questionId}`);
        if (!response.ok) throw new Error('Question not found');
        
        const question = await response.json();
        
        // Update UI
        document.getElementById('question-title').textContent = question.title;
        document.getElementById('question-description').textContent = question.description;
        document.getElementById('code-editor').value = question.boilerplate;
        
        // Store question data globally
        window.currentQuestion = question;
        
      } catch (error) {
        console.error('Failed to load question:', error);
        document.getElementById('question-title').textContent = 'ERR_LOAD';
        return;
      }

      // Solution button handler
      document.getElementById('solution-btn').addEventListener('click', (e) => {
        e.preventDefault();
        const solutionBox = document.getElementById('solution-box');
        const arch = document.querySelector('.architecture-select').value;
        
        if (solutionBox.style.display === 'none') {
          const solution = window.currentQuestion?.solutions[arch] || 
                          window.currentQuestion?.solutions[arch.replace('32', '')] || 
                          'No solution available for this architecture';
          solutionBox.textContent = solution;
          solutionBox.style.display = 'block';
        } else {
          solutionBox.style.display = 'none';
        }
      });

      // Form submission handler
      document.querySelector('.code-editor').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const code = document.getElementById('code-editor').value;
        const arch = document.querySelector('.architecture-select').value;
        const submitBtn = e.target.querySelector('.submit-btn');
        const outputBlock = document.querySelector('.output-block');
        const outputContent = document.getElementById('output-content');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'EXECUTING...';
        outputBlock.style.display = 'none';
        
        // Clear old result
        const oldRes = document.getElementById('result-indicator');
        if (oldRes) oldRes.remove();
        
        try {
          const response = await fetch('/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              code, 
              architecture: arch,
              question_id: questionId 
            })
          });
          
          const data = await response.json();
          let cleanOutput = data.output || 'No output received.';

          // Clean MIPS output
          if (arch === 'mips32') {
            cleanOutput = cleanOutput
              .split('\n')
              .filter(line =>
                !line.startsWith('SPIM Version') &&
                !line.includes('Copyright') &&
                !line.startsWith('Loaded:') &&
                !line.startsWith('All') &&
                !line.startsWith('See'),
              )
              .join('\n')
              .trim();
          }

          // Display output
          outputContent.textContent = cleanOutput;
          outputBlock.style.display = 'block';

          // Verify the answer
          if (data.expected_output) {
            const expected = data.expected_output.trim();
            const actual = cleanOutput.trim();
            const isCorrect = actual === expected;

            // Create result indicator
            let resultIndicator = document.createElement('div');
            resultIndicator.id = 'result-indicator';
            
            if (isCorrect) {
              resultIndicator.textContent = '✓ SECURE_MATCH // CORRECT';
              resultIndicator.style.backgroundColor = '#ccff00';
              resultIndicator.style.color = '#000';
            } else {
              resultIndicator.textContent = `✗ MISMATCH\nEXPECTED: ${expected}`;
              resultIndicator.style.backgroundColor = '#ff66cc';
              resultIndicator.style.color = '#000';
              resultIndicator.style.whiteSpace = 'pre-wrap';
            }
            outputBlock.appendChild(resultIndicator);
          }
          
        } catch (error) {
          console.error('Error:', error);
          outputContent.textContent = `Error: ${error.message}`;
          outputBlock.style.display = 'block';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = '> EXECUTE';
        }
      });

      // Architecture switcher
      document.querySelector('.architecture-select').addEventListener('change', function() {
        document.getElementById('code-editor').value = window.currentQuestion.boilerplate;
      });
    });
  </script>
</body>
</html>
